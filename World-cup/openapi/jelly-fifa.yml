          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      player:
                        $ref: '#/components/schemas/Player'
                      seasons:
                        type: array
                        items:
                          type: object
                          properties:
                            season:
                              $ref: '#/components/schemas/Season'
                            appearances:
                              type: integer
                            goals:
                              type: integer
                            assists:
                              type: integer
                            minutes_played:
                              type: integer
                            yellow_cards:
                              type: integer
                            red_cards:
                              type: integer
