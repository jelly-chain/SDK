                          type: integer
                          nullable: true
                        rating:
                          type: number
                          nullable: true
                        goals:
                          type: integer
                          nullable: true
                        assists:
                          type: integer
                          nullable: true
                  meta:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

