      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Match events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MatchEvent'
