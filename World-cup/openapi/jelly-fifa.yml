        - Lineups
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: team_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Match lineups
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LineupEntry'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/fifa/matches/{id}/form:
    get:
      operationId: getMatchTeamForm
      summary: Pre-match team form
      description: Recent form summary for both teams ahead of a match.
      tags:
        - Matches
        - Intelligence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pre-match form
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TeamFormEntry'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/fifa/matches/{id}/summary:
    get:
      operationId: getMatchSummary
      summary: Composite match summary
      description: Everything for a match — events, lineups, stats, best players — in one response.
      tags:
